spring:
  application:
    name: caisora

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/caisora}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

caisora:
  seguranca:
    jwt:
      segredo: ${JWT_SECRET:}
      expiracao-segundos: ${JWT_EXPIRATION_SECONDS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
